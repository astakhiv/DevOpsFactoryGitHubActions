# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on pull_request event but only for the "develop" branch
  pull_request:
    types: [opened, reopened]
    branches:
      - 'develop'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains two jobs called "test" and "build"
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Installs the dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Runs converage test using pytest
      - name: Run coverage test
        run: python -m pytest --cov=myapp tests > test_results.txt

      # Upload artifact
      - uses: actions/upload-artifact@v7
        with:
          name: test_results
          path: ./test_results.txt

      # Checks coverage. If < 70% - failure
      - name: Check coverage
        run: |
          cov=$(cat test_results.txt | grep ^TOTAL | grep -oE '[0-9]+' | tail -n 1)
          if [ "$cov" -lt 70 ]; then
            exit 1
          fi

  build:
    # This job depends on successful run of the "test" job
    needs: test
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Allow the job to edit files
    permissions:
      contents: write
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Adds a badge to README.md file if there is no
      - name: Add a badge to the README.md file if there is no
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | 
          grep '![Build status](https://github.com/astakhiv/DevOpsFactoryGitHubActions/actions/workflows/simpleWorkflow.yml/badge.svg)' README.md || sed -i '1i ![Build status](https://github.com/astakhiv/DevOpsFactoryGitHubActions/actions/workflows/simpleWorkflow.yml/badge.svg)' README.md

          git add .
          git commit -m "auto_edit: add badge to README.md"
          git push origin main
          git push https://x-access-token:$GH_TOKEN@://github.com{{ github.repository }}.git
